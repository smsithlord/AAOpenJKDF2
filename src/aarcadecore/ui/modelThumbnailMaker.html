<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Model Thumbnail Maker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: transparent;
            width: 100%; height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .top-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 157, 88, 0.8);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 8px 20px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            white-space: nowrap;
        }
        .capture-btn {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 157, 88, 0.9);
            color: #fff;
            border: none;
            padding: 10px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            display: none;
        }
        .capture-btn:hover { background: rgba(15, 157, 88, 1); }
        .select-rect {
            position: absolute;
            outline: 2px dashed rgba(15, 157, 88, 0.8);
            outline-offset: 2px;
            border: none;
            background: transparent;
            pointer-events: none;
            display: none;
        }
        .status {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #0f9d58;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="top-bar" id="topBar">THUMBNAIL MAKER</div>
    <div class="select-rect" id="selectRect"></div>
    <button class="capture-btn" id="captureBtn">Capture Thumbnail</button>
    <div class="status" id="status"></div>
    <div class="hint">Click and drag to select area &middot; Escape to cancel</div>
<script>
    var params = new URLSearchParams(window.location.search);
    var modelId = params.get('modelId') || '';
    var topBar = document.getElementById('topBar');
    topBar.textContent = modelId ? 'THUMBNAIL: ' + modelId : 'THUMBNAIL MAKER';

    var rect = document.getElementById('selectRect');
    var captureBtn = document.getElementById('captureBtn');
    var status = document.getElementById('status');

    var startX = 0, startY = 0, endX = 0, endY = 0;
    var isDragging = false;
    var hasRect = false;

    document.addEventListener('mousedown', function(e) {
        if (e.target === captureBtn) return;
        startX = e.clientX;
        startY = e.clientY;
        isDragging = true;
        hasRect = false;
        rect.style.display = 'block';
        captureBtn.style.display = 'none';
        status.textContent = '';
        updateRect(e.clientX, e.clientY);
    });

    document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        updateRect(e.clientX, e.clientY);
    });

    document.addEventListener('mouseup', function(e) {
        if (!isDragging) return;
        isDragging = false;
        endX = e.clientX;
        endY = e.clientY;
        var w = Math.abs(endX - startX);
        var h = Math.abs(endY - startY);
        if (w > 10 && h > 10) {
            hasRect = true;
            captureBtn.style.display = 'block';
        } else {
            rect.style.display = 'none';
        }
    });

    function updateRect(mx, my) {
        var x = Math.min(startX, mx);
        var y = Math.min(startY, my);
        var w = Math.abs(mx - startX);
        var h = Math.abs(my - startY);
        rect.style.left = x + 'px';
        rect.style.top = y + 'px';
        rect.style.width = w + 'px';
        rect.style.height = h + 'px';
    }

    captureBtn.addEventListener('click', function() {
        if (!hasRect || !modelId) return;

        var x = Math.min(startX, endX);
        var y = Math.min(startY, endY);
        var w = Math.abs(endX - startX);
        var h = Math.abs(endY - startY);

        /* Convert overlay coords (1920x1080) to framebuffer coords
         * glReadPixels Y is flipped (0 = bottom) */
        var fbY = 1080 - y - h;

        var ok = false;
        try {
            if (window.aapi && aapi.manager && aapi.manager.captureThumbnail) {
                ok = aapi.manager.captureThumbnail(modelId, x, fbY, w, h);
            }
        } catch (e) {
            status.textContent = 'Error: ' + e;
            return;
        }

        if (ok) {
            status.textContent = 'Thumbnail saved!';
            rect.style.display = 'none';
            captureBtn.style.display = 'none';
            hasRect = false;
            setTimeout(function() {
                if (window.aapi && aapi.manager) aapi.manager.closeMenu();
            }, 800);
        } else {
            status.textContent = 'Capture failed.';
        }
    });
</script>
</body>
</html>
