<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AArcade - Task Menu</title>
    <script src="taskMenu.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: transparent;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .menu-container {
            text-align: center;
            padding: 40px;
            background: rgba(20, 20, 40, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            min-width: 500px;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
        }
        h1 { font-size: 32px; color: #0f9d58; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #666; margin-bottom: 20px; }
        .task-list { text-align: left; }
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }
        .task-info { flex: 1; margin-right: 12px; overflow: hidden; }
        .task-item-id { font-size: 12px; color: #888; font-family: monospace; }
        .task-url { font-size: 13px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px; }
        .close-btn {
            padding: 6px 14px;
            background: rgba(200, 50, 50, 0.3);
            border: 1px solid rgba(200, 50, 50, 0.5);
            border-radius: 6px;
            color: #ff8888;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }
        .close-btn:hover { background: rgba(200, 50, 50, 0.5); color: #fff; }
        .back-btn {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 16px;
            cursor: pointer;
        }
        .back-btn:hover { background: rgba(15, 157, 88, 0.2); border-color: #0f9d58; color: #fff; }
        .empty-msg { color: #666; font-style: italic; padding: 20px; }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>Task Menu</h1>
        <div class="subtitle" id="subtitle">Active Instances</div>
        <div class="task-list" id="taskList"></div>
        <button class="back-btn" onclick="onBack()">Back to Menu</button>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', refreshList);
    </script>
</body>
</html>
