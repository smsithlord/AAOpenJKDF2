<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AArcade - Main Menu</title>
    <script src="mainMenu.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: transparent;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .menu-container {
            text-align: center;
            padding: 60px;
            background: rgba(20, 20, 40, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            min-width: 400px;
        }
        h1 {
            font-size: 42px;
            color: #0f9d58;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(15, 157, 88, 0.4);
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 40px;
        }
        .menu-btn {
            display: block;
            width: 100%;
            padding: 16px 32px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .menu-btn:hover {
            background: rgba(15, 157, 88, 0.2);
            border-color: #0f9d58;
            color: #fff;
        }
        .menu-btn:active {
            transform: scale(0.98);
        }
        .menu-btn.close-btn {
            margin-top: 20px;
            background: rgba(200, 50, 50, 0.15);
            border-color: rgba(200, 50, 50, 0.3);
        }
        .test-input {
            margin-bottom: 20px;
        }
        .test-input label {
            display: block;
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }
        .test-input input {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 20px;
            padding: 12px 20px;
            width: 320px;
            outline: none;
            text-align: center;
        }
        .test-input input:focus {
            border-color: #0f9d58;
            box-shadow: 0 0 12px rgba(15, 157, 88, 0.3);
        }
        .menu-btn.close-btn:hover,
        .menu-btn.close-btn:focus {
            background: rgba(200, 50, 50, 0.3);
            border-color: rgba(200, 50, 50, 0.6);
            outline: none;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>AArcade</h1>
        <div class="subtitle">Main Menu</div>
        <div class="test-input">
            <label>Test Input</label>
            <input type="text" id="testInput" placeholder="Type here..." autofocus>
        </div>
        <button class="menu-btn" onclick="onLibraryBrowser()">Library Browser</button>
        <button class="menu-btn" onclick="onTestLibretro()">Test Libretro</button>
        <button class="menu-btn" onclick="onEngineMenu()">Engine Main Menu</button>
        <button class="menu-btn close-btn" id="closeBtn" onclick="onCloseMenu()">Close Menu</button>
    </div>
    <script>
        document.getElementById('testInput').focus();
    </script>
</body>
</html>
