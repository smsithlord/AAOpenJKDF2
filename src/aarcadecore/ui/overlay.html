<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AArcade Overlay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: transparent; width: 100%; height: 100vh; overflow: hidden; }

        .overlay-bar {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .overlay-tab {
            background: rgba(40, 40, 40, 1.0);
            color: #ccc;
            font-size: 16px;
            padding: 8px 32px;
            border-radius: 0 0 8px 8px;  /* bottom corners rounded */
            cursor: pointer;
            user-select: none;
            transition: background 0.15s, color 0.15s;
        }
        .overlay-tab:hover {
            background: rgba(60, 60, 60, 1.0);
            color: #fff;
        }
        .overlay-tab.active {
            background: rgba(50, 50, 50, 1.0);
            color: #fff;
        }
        .overlay-tab.active:hover {
            background: rgba(70, 70, 70, 1.0);
            color: #fff;
        }

        .address-bar {
            display: flex;
            flex-direction: row;
            align-items: flex-end;
            background: rgba(35, 35, 35, 1.0);
            padding: 8px 12px;
            border-radius: 0 0 8px 8px;
            gap: 8px;
            min-width: 800px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease, padding 0.25s ease;
            padding-top: 0;
            padding-bottom: 0;
        }
        .address-bar.open {
            max-height: 80px;
            padding: 8px 12px;
        }

        .address-bar button {
            background: rgba(70, 70, 70, 1.0);
            color: #ccc;
            border: none;
            border-radius: 4px;
            padding: 8px 14px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: background 0.12s, color 0.12s;
        }
        .address-bar button:hover:not(:disabled) {
            background: rgba(100, 100, 100, 1.0);
            color: #fff;
        }
        .address-bar button:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .address-bar input {
            flex: 1;
            background: rgba(20, 20, 20, 1.0);
            color: #ddd;
            border: 1px solid rgba(80, 80, 80, 0.6);
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 15px;
            font-family: 'Segoe UI', Arial, sans-serif;
            outline: none;
        }
        .address-bar input:focus {
            border-color: rgba(100, 160, 255, 0.7);
        }

        .overlay-cursor {
            position: absolute;
            pointer-events: none;
            z-index: 99999;
        }
        .overlay-cursor img {
            width: 48px;
            height: 48px;
            display: block;
            transform: translate(-22%, -3%);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div style="position:absolute;top:5px;left:5px;font-size:30px;color:#888;cursor:pointer;pointer-events:auto;z-index:99999" onclick="location.reload()">&#8226;</div>
    <div class="overlay-bar" id="bar">
        <div class="address-bar" id="addressBar">
            <button id="btnBack" title="Back" disabled>&#9664;</button>
            <button id="btnForward" title="Forward" disabled>&#9654;</button>
            <button id="btnReload" title="Reload">&#8635;</button>
            <input type="text" id="addressInput" placeholder="Address..." />
        </div>
        <div class="address-bar" id="libretroBar">
            <span style="color:#888; font-size:15px; margin-right:6px;">Core:</span>
            <input type="text" id="coreInput" readonly style="flex:1; margin-right:12px;" />
            <span style="color:#888; font-size:15px; margin-right:6px;">File:</span>
            <input type="text" id="fileInput" readonly style="flex:1;" />
        </div>
        <div class="overlay-tab" id="tab">Web Browser</div>
    </div>
    <div class="overlay-cursor" id="cursor"><img src="cursors/default.png" alt=""></div>
<script>
    var tab = document.getElementById('tab');
    var addressBar = document.getElementById('addressBar');
    var libretroBar = document.getElementById('libretroBar');
    var coreInput = document.getElementById('coreInput');
    var fileInput = document.getElementById('fileInput');
    var addressInput = document.getElementById('addressInput');
    var cursor = document.getElementById('cursor');
    var btnBack = document.getElementById('btnBack');
    var btnForward = document.getElementById('btnForward');
    var btnReload = document.getElementById('btnReload');
    var barOpen = false;

    /* Navigation buttons */
    btnBack.addEventListener('click', function(e) {
        try { aapi.manager.goBack(); } catch(ex) {}
        e.stopPropagation();
    });
    btnForward.addEventListener('click', function(e) {
        try { aapi.manager.goForward(); } catch(ex) {}
        e.stopPropagation();
    });
    btnReload.addEventListener('click', function(e) {
        try { aapi.manager.reloadInstance(); } catch(ex) {}
        e.stopPropagation();
    });

    function toggleBar() {
        barOpen = !barOpen;
        addressBar.className = barOpen ? 'address-bar open' : 'address-bar';
        libretroBar.className = barOpen ? 'address-bar open' : 'address-bar';
        tab.className = barOpen ? 'overlay-tab active' : 'overlay-tab';
    }

    tab.addEventListener('click', function(e) {
        toggleBar();
        e.stopPropagation();
    });

    document.addEventListener('click', function(e) {
        if (barOpen && !document.getElementById('bar').contains(e.target)) {
            toggleBar();
        }
    });

    document.addEventListener('mousemove', function(e) {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    /* Navigate on Enter in address bar */
    addressInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            var url = addressInput.value.trim();
            if (url) {
                try { aapi.manager.navigateInstance(url); } catch(ex) {}
                addressInput.blur();
            }
        }
    });

    /* Populate address bar from bridge */
    try {
        if (typeof aapi !== 'undefined' && aapi.manager && aapi.manager.getOverlayInstanceInfo) {
            var info = aapi.manager.getOverlayInstanceInfo();
            if (info && info.url) addressInput.value = info.url;
        }
    } catch (e) {}

    /* Mode change handler — called from C++ with rich state payload */
    window.onOverlayModeChanged = function(state) {
        if (!state) return;
        /* Show/hide virtual cursor based on mode */
        cursor.style.display = (state.mode === 'input') ? '' : 'none';

        /* Adapt UI for instance type — hide inactive bar completely */
        if (state.instanceType === 'libretro') {
            tab.textContent = 'Libretro';
            addressBar.style.display = 'none';
            libretroBar.style.display = '';
            coreInput.value = state.corePath || '';
            fileInput.value = state.gamePath || '';
        } else {
            tab.textContent = 'Web Browser';
            addressBar.style.display = '';
            libretroBar.style.display = 'none';
            if (state.url) addressInput.value = state.url;
            btnBack.disabled = !state.canGoBack;
            btnForward.disabled = !state.canGoForward;
        }
    };

    /* Initial mode check — build full state from available APIs */
    try {
        if (typeof aapi !== 'undefined' && aapi.manager) {
            var initState = { mode: '' };
            if (aapi.manager.getOverlayMode) initState.mode = aapi.manager.getOverlayMode() || '';
            if (aapi.manager.getOverlayInstanceInfo) {
                var info = aapi.manager.getOverlayInstanceInfo();
                if (info) {
                    initState.url = info.url;
                    initState.title = info.title;
                    initState.itemId = info.itemId;
                    initState.instanceType = info.instanceType;
                    initState.corePath = info.corePath;
                    initState.gamePath = info.gamePath;
                }
            }
            window.onOverlayModeChanged(initState);
        }
    } catch (e) {}

    /* Keyboard focus routing: when a form input is focused, tell C++ to
     * send keyboard events to the HUD instead of the input instance */
    document.addEventListener('focusin', function(e) {
        var tag = e.target.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable) {
            try { if (aapi && aapi.manager) aapi.manager.setHudInputActive(true); } catch(ex) {}
        }
    });
    document.addEventListener('focusout', function() {
        try { if (aapi && aapi.manager) aapi.manager.setHudInputActive(false); } catch(ex) {}
    });
</script>
</body>
</html>
