<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AArcade Overlay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: transparent; width: 100%; height: 100vh; overflow: hidden; }

        .overlay-bar {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .overlay-tab {
            background: rgba(40, 40, 40, 0.85);
            color: #ccc;
            font-size: 13px;
            padding: 5px 20px;
            border-radius: 0 0 6px 6px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s, color 0.15s;
        }
        .overlay-tab:hover {
            background: rgba(60, 60, 60, 0.95);
            color: #fff;
        }
        .overlay-tab.active {
            background: rgba(50, 50, 50, 0.95);
            color: #fff;
            border-radius: 0 0 0 0;
        }

        .address-bar {
            display: none;
            flex-direction: row;
            align-items: center;
            background: rgba(35, 35, 35, 0.92);
            padding: 4px 6px;
            border-radius: 0 0 6px 6px;
            gap: 4px;
            min-width: 400px;
        }
        .address-bar.open { display: flex; }

        .address-bar button {
            background: rgba(70, 70, 70, 0.9);
            color: #ccc;
            border: none;
            border-radius: 3px;
            padding: 4px 8px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: background 0.12s, color 0.12s;
        }
        .address-bar button:hover {
            background: rgba(100, 100, 100, 0.95);
            color: #fff;
        }

        .address-bar input {
            flex: 1;
            background: rgba(20, 20, 20, 0.9);
            color: #ddd;
            border: 1px solid rgba(80, 80, 80, 0.6);
            border-radius: 3px;
            padding: 4px 8px;
            font-size: 12px;
            font-family: 'Segoe UI', Arial, sans-serif;
            outline: none;
        }
        .address-bar input:focus {
            border-color: rgba(100, 160, 255, 0.7);
        }

        .overlay-cursor {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: #00dd00;
            pointer-events: none;
            z-index: 99999;
        }
    </style>
</head>
<body>
    <div class="overlay-bar" id="bar">
        <div class="overlay-tab" id="tab">Web Browser</div>
        <div class="address-bar" id="addressBar">
            <button id="btnBack" title="Back">&#9664;</button>
            <button id="btnForward" title="Forward">&#9654;</button>
            <button id="btnReload" title="Reload">&#8635;</button>
            <input type="text" id="addressInput" placeholder="Address..." />
        </div>
    </div>
    <div class="overlay-cursor" id="cursor"></div>
<script>
    var tab = document.getElementById('tab');
    var addressBar = document.getElementById('addressBar');
    var cursor = document.getElementById('cursor');
    var barOpen = false;

    tab.addEventListener('click', function(e) {
        barOpen = !barOpen;
        addressBar.className = barOpen ? 'address-bar open' : 'address-bar';
        tab.className = barOpen ? 'overlay-tab active' : 'overlay-tab';
        e.stopPropagation();
    });

    document.addEventListener('click', function(e) {
        if (barOpen && !document.getElementById('bar').contains(e.target)) {
            barOpen = false;
            addressBar.className = 'address-bar';
            tab.className = 'overlay-tab';
        }
    });

    document.addEventListener('mousemove', function(e) {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });
</script>
</body>
</html>
