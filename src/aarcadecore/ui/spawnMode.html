<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AArcade - Spawn Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: transparent;
            width: 100%; height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .spawn-label {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 157, 88, 0.7);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            padding: 8px 24px;
            border-radius: 6px;
        }
        .spawn-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }
        .model-selector {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 6px 0;
            max-height: 300px;
            overflow-y: auto;
            min-width: 180px;
        }
        .model-item {
            padding: 4px 14px;
            color: #999;
            font-size: 12px;
            white-space: nowrap;
            cursor: default;
        }
        .model-item.active {
            background: rgba(15, 157, 88, 0.3);
            color: #fff;
        }
        /* Transform panel — tabbed 2-column layout, centered bottom */
        .transform-panel {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            display: none;
            flex-direction: row;
            overflow: hidden;
        }
        .transform-panel.visible { display: flex; }
        /* Left: tab buttons */
        .transform-tabs {
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
            min-width: 80px;
        }
        .transform-tab {
            padding: 10px 14px;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: none;
            text-align: left;
            white-space: nowrap;
        }
        .transform-tab:hover { color: #ccc; background: rgba(255,255,255,0.04); }
        .transform-tab.active { color: #fff; background: rgba(15,157,88,0.25); border-left: 3px solid #0f9d58; }
        /* Right: tab content */
        .transform-content {
            padding: 12px 16px;
            min-width: 640px;
        }
        .transform-content > div { display: none; }
        .transform-content > div.active { display: block; }
        .transform-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        .transform-row input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255,255,255,0.12);
            border-radius: 2px;
            outline: none;
            min-width: 400px;
        }
        .transform-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #0f9d58;
            border-radius: 50%;
            cursor: pointer;
        }
        .transform-row .val {
            color: #aaa;
            font-size: 11px;
            width: 50px;
            text-align: right;
            flex-shrink: 0;
        }
        .axis-label {
            color: #ccc;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            min-width: 16px;
            text-align: center;
        }
        .axis-label:hover { color: #0f9d58; }
        .axis-preset {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 3px;
            color: #999;
            font-size: 9px;
            padding: 2px 4px;
            cursor: pointer;
            line-height: 1;
        }
        .axis-preset:hover { color: #fff; background: rgba(255,255,255,0.15); }
        .transform-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            color: #999;
            font-size: 11px;
        }
        .transform-toggle input { cursor: pointer; }
        .model-name {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            background: rgba(0, 0, 0, 0.4);
            padding: 3px 12px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="spawn-label" id="spawnLabel">SPAWN MODE</div>
    <div class="model-name" id="modelName"></div>
    <div class="model-selector">
        <div id="modelListHeader" style="padding:4px 14px;color:#666;font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:2px;"></div>
        <div id="modelList"></div>
    </div>
    <div class="transform-panel" id="transformPanel">
        <div class="transform-tabs">
            <button class="transform-tab" data-tab="resetTab">RESET</button>
            <button class="transform-tab active" data-tab="rotateTab">ROTATE</button>
            <button class="transform-tab" data-tab="offsetTab">OFFSET</button>
            <button class="transform-tab" data-tab="scaleTab">SCALE</button>
        </div>
        <div class="transform-content">
            <!-- Reset tab -->
            <div id="resetTab"></div>
            <!-- Rotate tab -->
            <div id="rotateTab" class="active">
                <div class="transform-row">
                    <span class="axis-preset" data-slider="pitchSlider" data-val="-90">&#8630;</span>
                    <span class="axis-label" data-slider="pitchSlider">P</span>
                    <span class="axis-preset" data-slider="pitchSlider" data-val="90">&#8631;</span>
                    <input type="range" id="pitchSlider" min="-180" max="180" value="0" step="1">
                    <span class="val" id="pitchVal">0&deg;</span>
                </div>
                <div class="transform-row">
                    <span class="axis-preset" data-slider="yawSlider" data-val="-90">&#8630;</span>
                    <span class="axis-label" data-slider="yawSlider">Y</span>
                    <span class="axis-preset" data-slider="yawSlider" data-val="90">&#8631;</span>
                    <input type="range" id="yawSlider" min="-180" max="180" value="0" step="1">
                    <span class="val" id="yawVal">0&deg;</span>
                </div>
                <div class="transform-row">
                    <span class="axis-preset" data-slider="rollSlider" data-val="-90">&#8630;</span>
                    <span class="axis-label" data-slider="rollSlider">R</span>
                    <span class="axis-preset" data-slider="rollSlider" data-val="90">&#8631;</span>
                    <input type="range" id="rollSlider" min="-180" max="180" value="0" step="1">
                    <span class="val" id="rollVal">0&deg;</span>
                </div>
                <div class="transform-toggle">
                    <input type="checkbox" id="worldRotation">
                    <label for="worldRotation">Auto Rotation</label>
                </div>
            </div>
            <!-- Offset tab -->
            <div id="offsetTab">
                <div class="transform-row">
                    <span class="axis-label" data-slider="offXSlider">X</span>
                    <input type="range" id="offXSlider" min="-2" max="2" value="0" step="0.005">
                    <span class="val" id="offXVal">0 in</span>
                </div>
                <div class="transform-row">
                    <span class="axis-label" data-slider="offYSlider">Y</span>
                    <input type="range" id="offYSlider" min="-2" max="2" value="0" step="0.005">
                    <span class="val" id="offYVal">0 in</span>
                </div>
                <div class="transform-row">
                    <span class="axis-label" data-slider="offZSlider">Z</span>
                    <input type="range" id="offZSlider" min="-2" max="2" value="0" step="0.005">
                    <span class="val" id="offZVal">0 in</span>
                </div>
                <div class="transform-toggle" style="display:flex; gap:16px;">
                    <span style="display:flex; align-items:center; gap:4px;"><input type="checkbox" id="worldOffset"><label for="worldOffset">World Offset</label></span>
                    <span style="display:flex; align-items:center; gap:4px;"><input type="checkbox" id="raycastOffset"><label for="raycastOffset">Raycast Offset</label></span>
                </div>
            </div>
            <!-- Scale tab -->
            <div id="scaleTab">
                <div class="transform-row">
                    <span class="axis-label" data-slider="scaleSlider">&#x25FA;</span>
                    <input type="range" id="scaleSlider" min="0.1" max="10" value="1" step="0.05">
                    <span class="val" id="scaleVal">1.0</span>
                </div>
            </div>
        </div>
    </div>
    <div class="spawn-hint">Click to place &middot; Escape to cancel &middot; Scroll to change model &middot; RMB for transform</div>
<script>
    var models = [];
    var currentIndex = 0;
    var dwellTimer = null;
    var modelListEl = document.getElementById('modelList');
    var modelNameEl = document.getElementById('modelName');

    /* Detect cabinet vs prop mode */
    var isPropMode = true;
    try {
        if (typeof aapi !== 'undefined' && aapi.manager && aapi.manager.getSpawnItemId) {
            var spawnItemId = aapi.manager.getSpawnItemId();
            isPropMode = !spawnItemId;
        }
    } catch (e) {}
    document.getElementById('spawnLabel').textContent = isPropMode ? 'SPAWN PROP' : 'SPAWN CABINET';
    document.getElementById('modelListHeader').textContent = isPropMode ? 'Props' : 'Cabinets';

    /* Load available models from bridge and filter by mode */
    var allModels = [];
    try {
        if (typeof aapi !== 'undefined' && aapi.library && aapi.library.getModels) {
            allModels = aapi.library.getModels(0, 500) || [];
        }
    } catch (e) {}

    /* Filter: props show non-cabinet models, cabinets show only dynamic-material models */
    for (var fi = 0; fi < allModels.length; fi++) {
        var isCab = false;
        try {
            if (typeof aapi !== 'undefined' && aapi.manager && aapi.manager.isModelCabinet)
                isCab = aapi.manager.isModelCabinet(allModels[fi].id);
        } catch (e) {}
        if (isPropMode ? !isCab : isCab)
            models.push(allModels[fi]);
    }

    /* Set initial model index from current spawn/move object. If the C++ side
     * handed us a model that doesn't belong to the current category (e.g. a
     * prop model leaked into an item spawn), fall back to index 0 AND push
     * that choice back to C++ so a confirm-without-scrolling doesn't place
     * the leaked wrong-category model. */
    var initMatched = false;
    try {
        if (typeof aapi !== 'undefined' && aapi.manager && aapi.manager.getSpawnModelId) {
            var initModelId = aapi.manager.getSpawnModelId();
            if (initModelId) {
                for (var mi = 0; mi < models.length; mi++) {
                    if (models[mi].id === initModelId) { currentIndex = mi; initMatched = true; break; }
                }
            }
        }
    } catch (e) {}

    /* Build the visible list (show ~5 items around current) */
    function renderList() {
        modelListEl.innerHTML = '';
        if (models.length === 0) return;

        var visible = 7;
        var half = Math.floor(visible / 2);
        var start = currentIndex - half;

        for (var i = 0; i < visible; i++) {
            var idx = ((start + i) % models.length + models.length) % models.length;
            var item = document.createElement('div');
            item.className = 'model-item' + (idx === currentIndex ? ' active' : '');
            item.textContent = models[idx].title || models[idx].id;
            modelListEl.appendChild(item);
        }

        modelNameEl.textContent = models[currentIndex].title || models[currentIndex].id;
    }

    function applyModel() {
        if (models.length === 0) return;
        var model = models[currentIndex];
        try {
            if (typeof aapi !== 'undefined' && aapi.manager && aapi.manager.setSpawnModeModel) {
                aapi.manager.setSpawnModeModel(model.id);
            }
        } catch (e) {}
    }

    /* Mouse wheel cycling — called from C++ via EvaluateScript */
    window.onSpawnWheel = function(delta) {
        console.log('[spawnMode] onSpawnWheel delta=' + delta + ' models=' + models.length);
        if (models.length === 0) return;
        if (delta > 0) {
            currentIndex = (currentIndex - 1 + models.length) % models.length;
        } else if (delta < 0) {
            currentIndex = (currentIndex + 1) % models.length;
        }
        renderList();

        /* Dwell timer: apply after 500ms without scrolling */
        clearTimeout(dwellTimer);
        dwellTimer = setTimeout(function() {
            applyModel();
        }, 500);
    };

    renderList();
    /* If the initial C++ model wasn't in this category's filtered list, push
     * the category's index-0 choice back so a no-scroll confirm spawns it. */
    if (!initMatched && models.length > 0) applyModel();

    /* Transform panel */
    var transformPanel = document.getElementById('transformPanel');
    var pitchSlider = document.getElementById('pitchSlider');
    var yawSlider = document.getElementById('yawSlider');
    var rollSlider = document.getElementById('rollSlider');
    var pitchVal = document.getElementById('pitchVal');
    var yawVal = document.getElementById('yawVal');
    var rollVal = document.getElementById('rollVal');
    var worldRotation = document.getElementById('worldRotation');
    var offXSlider = document.getElementById('offXSlider');
    var offYSlider = document.getElementById('offYSlider');
    var offZSlider = document.getElementById('offZSlider');
    var offXVal = document.getElementById('offXVal');
    var offYVal = document.getElementById('offYVal');
    var offZVal = document.getElementById('offZVal');
    var worldOffset = document.getElementById('worldOffset');
    var raycastOffset = document.getElementById('raycastOffset');
    var scaleSlider = document.getElementById('scaleSlider');
    var scaleVal = document.getElementById('scaleVal');

    function getModelId() {
        try {
            if (typeof aapi !== 'undefined' && aapi.manager && aapi.manager.getSpawnModelId)
                return aapi.manager.getSpawnModelId() || '';
        } catch (e) {}
        return '';
    }

    function sendTransform() {
        var p = parseInt(pitchSlider.value);
        var y = parseInt(yawSlider.value);
        var r = parseInt(rollSlider.value);
        var ox = parseFloat(offXSlider.value);
        var oy = parseFloat(offYSlider.value);
        var oz = parseFloat(offZSlider.value);
        var sc = parseFloat(scaleSlider.value);
        pitchVal.innerHTML = p + '&deg;';
        yawVal.innerHTML = y + '&deg;';
        rollVal.innerHTML = r + '&deg;';
        offXVal.textContent = ox.toFixed(2) + ' in';
        offYVal.textContent = oy.toFixed(2) + ' in';
        offZVal.textContent = oz.toFixed(2) + ' in';
        scaleVal.textContent = sc.toFixed(1);
        try {
            if (typeof aapi !== 'undefined' && aapi.manager && aapi.manager.setSpawnTransform)
                aapi.manager.setSpawnTransform(p, y, r, worldRotation.checked,
                    ox, oy, oz, worldOffset.checked, raycastOffset.checked, sc);
        } catch (e) {}
    }

    function loadTransformForModel() {
        var mid = getModelId();
        if (!mid) return;
        try {
            var saved = JSON.parse(localStorage.getItem('spawnTransform_' + mid));
            if (saved) {
                pitchSlider.value = saved.pitch || 0;
                yawSlider.value = saved.yaw || 0;
                rollSlider.value = saved.roll || 0;
                offXSlider.value = saved.offX || 0;
                offYSlider.value = saved.offY || 0;
                offZSlider.value = saved.offZ || 0;
                scaleSlider.value = saved.scale || 1;
                sendTransform();
            }
        } catch (e) {}
    }

    function saveTransformForModel() {
        var mid = getModelId();
        if (!mid) return;
        try {
            localStorage.setItem('spawnTransform_' + mid, JSON.stringify({
                pitch: parseInt(pitchSlider.value), yaw: parseInt(yawSlider.value), roll: parseInt(rollSlider.value),
                offX: parseFloat(offXSlider.value), offY: parseFloat(offYSlider.value), offZ: parseFloat(offZSlider.value),
                scale: parseFloat(scaleSlider.value)
            }));
        } catch (e) {}
    }

    /* Attach listeners */
    var allSliders = [pitchSlider, yawSlider, rollSlider, offXSlider, offYSlider, offZSlider, scaleSlider];
    for (var s = 0; s < allSliders.length; s++) allSliders[s].addEventListener('input', sendTransform);
    worldRotation.addEventListener('change', sendTransform);
    worldOffset.addEventListener('change', sendTransform);
    raycastOffset.addEventListener('change', sendTransform);

    /* Click label to zero the slider (scale resets to 1.0) */
    var axisLabels = document.querySelectorAll('.axis-label');
    for (var al = 0; al < axisLabels.length; al++) {
        (function(label) {
            label.addEventListener('click', function() {
                var sliderId = label.getAttribute('data-slider');
                var slider = document.getElementById(sliderId);
                if (slider) {
                    slider.value = (sliderId === 'scaleSlider') ? 1 : 0;
                    sendTransform();
                }
            });
        })(axisLabels[al]);
    }

    /* Preset buttons (-90, 90) */
    var presetBtns = document.querySelectorAll('.axis-preset');
    for (var pb = 0; pb < presetBtns.length; pb++) {
        (function(btn) {
            btn.addEventListener('click', function() {
                var slider = document.getElementById(btn.getAttribute('data-slider'));
                if (slider) { slider.value = btn.getAttribute('data-val'); sendTransform(); }
            });
        })(presetBtns[pb]);
    }

    /* Tab switching */
    var tabs = document.querySelectorAll('.transform-tab');
    var tabContents = document.querySelectorAll('.transform-content > div');
    for (var ti = 0; ti < tabs.length; ti++) {
        (function(tab) {
            tab.addEventListener('click', function() {
                var targetId = tab.getAttribute('data-tab');
                /* Reset tab: zero everything and stay on rotate */
                if (targetId === 'resetTab') {
                    pitchSlider.value = 0; yawSlider.value = 0; rollSlider.value = 0;
                    offXSlider.value = 0; offYSlider.value = 0; offZSlider.value = 0;
                    scaleSlider.value = 1.0;
                    worldRotation.checked = false; worldOffset.checked = false; raycastOffset.checked = false;
                    sendTransform();
                    return;
                }
                for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
                for (var j = 0; j < tabContents.length; j++) tabContents[j].classList.remove('active');
                tab.classList.add('active');
                var target = document.getElementById(targetId);
                if (target) target.classList.add('active');
            });
        })(tabs[ti]);
    }

    /* Load saved transform for current model, with initial scale override for clones */
    loadTransformForModel();
    try {
        if (typeof aapi !== 'undefined' && aapi.manager && aapi.manager.getInitialSpawnScale) {
            var initScale = aapi.manager.getInitialSpawnScale();
            if (initScale && initScale !== 1.0) {
                scaleSlider.value = initScale;
                sendTransform();
            }
        }
    } catch (e) {}

    /* Called from C++ via EvaluateScript when spawn is confirmed */
    window.onSpawnConfirmed = function() {
        saveTransformForModel();
        /* Remember last confirmed model. Split by category so a prop spawn
         * doesn't overwrite the user's last cabinet choice (and vice versa).
         * Key scheme:
         *   lastSpawnModelId_item  — last cabinet model across all items
         *   lastSpawnModelId_prop  — last prop model
         *   lastSpawnModelId_<itemId> — per-item override (items only)
         *   lastSpawnModelId — legacy unified key, kept writing for any old
         *                      consumers but no longer read by the C++ side. */
        if (models.length > 0 && models[currentIndex]) {
            var mid = models[currentIndex].id;
            try {
                localStorage.setItem('lastSpawnModelId', mid);
                localStorage.setItem(isPropMode ? 'lastSpawnModelId_prop' : 'lastSpawnModelId_item', mid);
                if (typeof aapi !== 'undefined' && aapi.manager && aapi.manager.getSpawnItemId) {
                    var itemId = aapi.manager.getSpawnItemId();
                    if (itemId) localStorage.setItem('lastSpawnModelId_' + itemId, mid);
                }
            } catch (e) {}
        }
    };

    /* Show/hide transform panel based on input mode */
    window.onOverlayModeChanged = function(state) {
        if (!state) return;
        if (state.mode === 'input') {
            transformPanel.classList.add('visible');
        } else {
            transformPanel.classList.remove('visible');
        }
    };
</script>
</body>
</html>
