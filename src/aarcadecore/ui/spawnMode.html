<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AArcade - Spawn Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: transparent;
            width: 100%; height: 100vh;
            overflow: hidden;
        }
        .spawn-label {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 157, 88, 0.7);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            padding: 8px 24px;
            border-radius: 6px;
        }
        .spawn-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="spawn-label">SPAWN MODE</div>
    <div class="spawn-hint">Click to place &middot; Escape to cancel</div>
</body>
</html>
